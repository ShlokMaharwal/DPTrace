<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DPTrace — step through dynamic programming algorithms one decision at a time. Fibonacci, Knapsack, LCS, Edit Distance, LIS, MCM, and more." />
    <title>DPTrace</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Lobster&display=swap" rel="stylesheet" />

    <!-- Theme init — runs before React, prevents flash -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dptrace-theme');
          if (saved === 'light') {
            /* leave html without .dark */
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
